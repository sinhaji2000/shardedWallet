
mode:
  type: Standalone

dataSources:
  shardwallet1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet1
    username: root
    password: Lumia540!!
    driverClassName: com.mysql.cj.jdbc.Driver

  shardwallet2:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet2
    username: root
    password: Lumia540!!
    driverClassName: com.mysql.cj.jdbc.Driver

rules:
  - !SHARDING
    tables:
      users:
        actualDataNodes: shardwallet$->{1..2}.users
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakestrategy
    
    # broadcastTables:
    #   - flyway_schema_history

    defaultDatabaseStrategy:
      standard:
        shardingColumn: id
        shardingAlgorithmName: db-inline

    shardingAlgorithms:
      db-inline:
        type: INLINE
        props:
          algorithm-expression: shardwallet$->{id % 2 + 1}

    keyGenerators:
      snowflakestrategy:
        type: SNOWFLAKE

props:
  sql-show: true